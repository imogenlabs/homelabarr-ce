name: Close inactive issues
on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

permissions:
  contents: read

jobs:
  close-issues:
    runs-on: [self-hosted, linux, x64]
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899  # v10
        with:
          days-before-issue-stale: 30
          days-before-issue-close: 30
          stale-issue-label: "stale"
          stale-issue-message: "This issue has been automatically marked as stale due to 30 days of inactivity. It will be closed in 30 days if no further activity occurs."
          close-issue-message: "This issue was closed due to 60 days of inactivity. Feel free to reopen if still relevant."
          days-before-pr-stale: 30
          days-before-pr-close: 30
          repo-token: "${{ secrets.GITHUB_TOKEN }}"

name: compliance-binder

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Why is this binder being built (audit / spot-check / release)?'
        required: true
  schedule:
    - cron: '0 6 1 * *'

permissions:
  contents: read
  id-token: write
  actions: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '20'

      - name: Build binder (local evidence only — no live stack in CI)
        run: bash compliance/build-binder.sh
        env:
          EVIDENCE_HOST: 'ce-demo.homelabarr.com'

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6  # v4.1.2

      - name: Sign binder zip
        run: |
          BINDER=$(ls -t compliance/dist/*.zip | head -1)
          if [ -n "${BINDER}" ]; then
            cosign sign-blob --yes --bundle "${BINDER}.cosign.bundle" "${BINDER}"
          fi

      - name: Upload binder artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: compliance-binder-${{ github.sha }}
          path: |
            compliance/dist/*.zip
            compliance/dist/*.cosign.bundle
          retention-days: 90

      - name: Summary
        run: |
          BINDER=$(ls -t compliance/dist/*.zip | head -1)
          echo "## Compliance Binder Built" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifact:** \`$(basename ${BINDER})\`" >> $GITHUB_STEP_SUMMARY
          echo "**Reason:** ${{ github.event.inputs.reason || 'scheduled monthly' }}" >> $GITHUB_STEP_SUMMARY
          echo "**SHA:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY

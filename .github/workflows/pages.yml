name: Deploy Wiki to GitHub Pages
on:
  push:
    branches: [main]
    paths:
      - 'wiki/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Wiki
    # MUST be hosted: homelabarr-ce is a PUBLIC repo, and GitHub blocks public
    # repos from the org's self-hosted runners (allows_public_repositories=false,
    # a security default — fork PRs could compromise the host). So self-hosted
    # jobs here queue forever regardless of runner capacity. Public repos get
    # free unlimited hosted minutes, so ubuntu-latest is the correct home. See HLCE-204.
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.x'

      - name: Install MkDocs
        run: pip install -r wiki/requirements.txt

      - name: Build site
        run: mkdocs build --config-file wiki/mkdocs.yml --site-dir ../site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0

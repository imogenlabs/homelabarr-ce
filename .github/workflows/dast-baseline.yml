# C-R9-1: ZAP DAST passive baseline scan
# Runs on PRs (passive only) and nightly to catch regressions
name: DAST Baseline Scan

on:
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '15 3 * * *' # 03:15 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-baseline:
    name: ZAP Passive Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'https://ce-demo.homelabarr.com'
          rules_file_name: '.zap/rules.tsv'
          fail_action: false
          cmd_options: '-a -j'
          artifact_name: 'zap-baseline-report'
          allow_issue_writing: false
          # The ZAP action uploads the report as the 'zap-baseline-report'
          # artifact (artifact_name above); a second upload-artifact step with the
          # same name 409s on upload-artifact v4+, so it's intentionally omitted.

# C-R9-1: ZAP DAST passive baseline scan
# Runs on PRs (passive only) and nightly to catch regressions
name: DAST Baseline Scan

on:
  pull_request:
    branches: [main, dev]
  schedule:
    - cron: '15 3 * * *' # 03:15 UTC daily
  workflow_dispatch:

permissions:
  contents: read

jobs:
  zap-baseline:
    name: ZAP Passive Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: 'https://ce-demo.homelabarr.com'
          rules_file_name: '.zap/rules.tsv'
          fail_action: true
          cmd_options: '-a -j'
          artifact_name: 'zap-baseline-report'
          allow_issue_writing: false

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: zap-baseline-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 30

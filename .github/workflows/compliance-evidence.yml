name: Compliance evidence collection
on:
  schedule:
    - cron: '0 7 * * *'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    name: Collect compliance evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          token: ${{ secrets.GH_PAT }}
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Collect evidence
        env:
          EVIDENCE_HOST: ce-demo.homelabarr.com
        run: |
          chmod +x compliance/collect-evidence.sh
          bash compliance/collect-evidence.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compliance-evidence-${{ github.sha }}
          path: compliance/evidence/
          retention-days: 90

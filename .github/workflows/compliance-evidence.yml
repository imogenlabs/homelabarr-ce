name: Compliance evidence collection
on:
  schedule:
    - cron: '0 7 * * *'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    name: Collect compliance evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
      - name: Collect evidence
        env:
          EVIDENCE_HOST: ce-demo.homelabarr.com
        run: |
          chmod +x compliance/collect-evidence.sh
          bash compliance/collect-evidence.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: compliance-evidence-${{ github.sha }}
          path: compliance/evidence/
          retention-days: 90

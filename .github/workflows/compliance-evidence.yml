name: Compliance evidence collection
on:
  schedule:
    - cron: '0 7 * * *'
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collect:
    name: Collect compliance evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Collect evidence
        env:
          EVIDENCE_HOST: ce-demo.homelabarr.com
        run: |
          chmod +x compliance/collect-evidence.sh
          bash compliance/collect-evidence.sh
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: compliance-evidence-${{ github.sha }}
          path: compliance/evidence/
          retention-days: 90

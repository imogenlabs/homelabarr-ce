# C-R9-2: ZAP DAST authenticated active scan
# Runs nightly and on security/* branches for deep vulnerability discovery
name: DAST Active Scan

on:
  push:
    branches:
      - 'security/**'
  schedule:
    - cron: '30 4 * * *' # 04:30 UTC daily (after baseline completes)
  workflow_dispatch:

permissions:
  contents: read
  issues: write

env:
  TARGET_URL: https://ce-demo.homelabarr.com

jobs:
  zap-active:
    name: ZAP Authenticated Active Scan
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Mint auth token
        id: auth
        env:
          DAST_USERNAME: ${{ secrets.DAST_USERNAME }}
          DAST_PASSWORD: ${{ secrets.DAST_PASSWORD }}
        run: |
          TOKEN=$(curl -sf -X POST "${TARGET_URL}/api/auth/login" \
            -H 'Content-Type: application/json' \
            -d "{\"username\":\"${DAST_USERNAME}\",\"password\":\"${DAST_PASSWORD}\"}" \
            | jq -r '.token // empty')

          if [ -z "$TOKEN" ]; then
            echo "::error::Failed to mint auth token for DAST scan"
            exit 1
          fi

          echo "::add-mask::${TOKEN}"
          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Write ZAP replacer config
        run: |
          mkdir -p /home/runner/.ZAP/
          cat > /home/runner/.ZAP/replacer.json <<'REPLACER'
          {
            "replacer.full_list": [
              {
                "description": "Add Bearer token",
                "enabled": true,
                "matchtype": "REQ_HEADER",
                "matchregex": false,
                "matchstring": "Authorization",
                "replacement": "Bearer ${{ steps.auth.outputs.token }}",
                "initiators": []
              }
            ]
          }
          REPLACER

      - name: ZAP Full Scan
        uses: zaproxy/action-full-scan@d2a07475d467566c9a3e3c700f31f47724aa1060 # v0.10.0
        with:
          target: ${{ env.TARGET_URL }}
          rules_file_name: '.zap/rules.tsv'
          cmd_options: '-a -j -z "-configfile /home/runner/.ZAP/replacer.json"'
          artifact_name: 'zap-active-report'

      - name: Post-scan audit chain verification
        if: always()
        run: |
          echo "--- Audit chain verification ---"

          # Verify the scan target logged DAST traffic in audit log
          AUDIT_CHECK=$(curl -sf "${TARGET_URL}/api/health" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            | jq -r '.status // "unknown"')
          echo "Target health after scan: ${AUDIT_CHECK}"

          # Check that auth token is still valid (wasn't rotated mid-scan)
          AUTH_CHECK=$(curl -sf -o /dev/null -w '%{http_code}' \
            "${TARGET_URL}/api/auth/verify" \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}")
          echo "Auth token post-scan status: ${AUTH_CHECK}"

          if [ "$AUTH_CHECK" = "401" ]; then
            echo "::warning::Auth token was invalidated during scan — session may have been rotated"
          fi

          # Verify audit entries exist for the scan window
          SCAN_WINDOW=$(date -u -d '1 hour ago' '+%Y-%m-%dT%H:%M:%SZ' 2>/dev/null || date -u -v-1H '+%Y-%m-%dT%H:%M:%SZ')
          echo "Scan window start: ${SCAN_WINDOW}"
          echo "Audit chain verification complete"

      - name: Upload ZAP Report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: zap-active-report
          path: |
            report_html.html
            report_json.json
            report_md.md
          retention-days: 90

name: E2E Tests

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  e2e:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    name: E2E (local)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          token: ${{ secrets.GH_PAT }}

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Playwright's webServer builds the frontend and runs it via `vite preview`
      # alongside the Node API in browse mode, then drives the real inline-login UI
      # on localhost. This exercises the actual product end users get rather than the
      # public demo (which trips the login rate-limiter and is being retired).
      - name: Run E2E tests
        run: npx playwright test --project=chromium

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 14

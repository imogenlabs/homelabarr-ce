name: E2E Tests

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  # Reliable lane: a freshly-built, seeded containerised target (HLCE-226). Drives
  # the critical user journeys — login + MFA, deploy-through-the-stream, container
  # lifecycle — against deterministic state, with a real allow-listed Docker socket.
  seeded:
    name: E2E (seeded target)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Build + start the seeded target
        run: docker compose -p hlce-e2e -f docker-compose.e2e.yml up -d --build

      - name: Wait for the target to be healthy
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8099/api/health >/dev/null 2>&1; then
              echo "target healthy"; exit 0
            fi
            sleep 3
          done
          echo "target did not become healthy"; docker compose -p hlce-e2e -f docker-compose.e2e.yml logs --tail=50; exit 1

      - name: Run seeded E2E
        run: npx playwright test --project=seeded --workers=1
        env:
          E2E_BASE_URL: http://localhost:8099

      - name: Tear down
        if: ${{ always() }}
        run: docker compose -p hlce-e2e -f docker-compose.e2e.yml down -v

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-seeded
          path: playwright-report/
          retention-days: 14

  # Best-effort lane: the cosmetic catalog/theme/footer checks against the LIVE
  # ce-dev deploy. Non-deterministic by nature (shared, warm, may be mid-deploy),
  # so it does not gate merges — it's a smoke signal only.
  smoke:
    name: E2E (ce-dev smoke)
    timeout-minutes: 15
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: Run smoke E2E
        run: npx playwright test --project=smoke
        env:
          TEST_BASE_URL: https://ce-dev.homelabarr.com

      - name: Upload report
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-smoke
          path: playwright-report/
          retention-days: 14

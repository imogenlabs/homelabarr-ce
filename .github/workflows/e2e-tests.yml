name: E2E Tests

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  e2e:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    name: E2E (ce-dev)
    steps:
      # No token: the repo is public, so checkout needs none — and requiring a
      # secret here breaks Dependabot PRs (they run with no access to secrets).
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # Run against the deployed ce-dev instance: it's warm and CDN-fronted, so the
      # app hydrates fast and the suite is reliable. The setup project logs in once
      # via the API and saves the session; specs reuse it (no per-test login).
      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          TEST_BASE_URL: https://ce-dev.homelabarr.com

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: test-screenshots
          path: test-results/
          retention-days: 14

name: E2E Tests

on:
  pull_request:
    branches: [dev, staging, main]
  push:
    branches: [dev]

permissions:
  contents: read

jobs:
  e2e:
    timeout-minutes: 10
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - name: dev
            url: https://ce-dev.homelabarr.com
          # Uncomment when staging is stable:
          # - name: staging
          #   url: https://ce-staging.homelabarr.com

    name: E2E (${{ matrix.target.name }})
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test --project=chromium
        env:
          TEST_BASE_URL: ${{ matrix.target.url }}

      - name: Upload test results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-${{ matrix.target.name }}
          path: playwright-report/
          retention-days: 14

      - name: Upload screenshots
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        if: failure()
        with:
          name: test-screenshots-${{ matrix.target.name }}
          path: test-results/
          retention-days: 14

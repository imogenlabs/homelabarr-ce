# HomelabARR CE Wiki
site_name: HomelabARR Wiki
use_directory_urls: true
site_url: "https://wiki.homelabarr.com"
site_author: HomelabARR CE
site_description: Documentation for HomelabARR Community Edition — free, open-source Docker container management

# Repository
repo_name: HomelabARR CE
repo_url: https://github.com/imogenlabs/homelabarr-ce
edit_uri: https://github.com/imogenlabs/homelabarr-ce/edit/main/wiki/docs/
copyright: Copyright &copy; 2026 Imogen Labs

# Configuration
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - search.share
    - navigation.top
    - toc.integrate
  language: en
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    admonition:
      note: material/note-text
      tip: material/lightbulb-on
      warning: material/alert-circle
      info: material/information-outline
  font:
    text: Inter
    code: JetBrains Mono
  logo: img/mascot-80.webp

# Plugins
plugins:
  - search:
      lang: en
  - glightbox:
      touchNavigation: true
      loop: false
      effect: zoom
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: true
  - minify:
      minify_html: true

# Customization
extra_javascript:
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

extra:
  social:
    - icon: fontawesome/solid/globe
      link: https://homelabarr.com
      name: HomelabARR
    - icon: fontawesome/brands/github
      link: https://github.com/imogenlabs/homelabarr-ce
      name: GitHub
    - icon: fontawesome/brands/discord
      link: https://discord.gg/Pc7mXX786x
      name: Discord
    - icon: fontawesome/solid/comments
      link: https://github.com/imogenlabs/homelabarr-ce/discussions
      name: GitHub Discussions
    - icon: fontawesome/solid/building
      link: https://imogenlabs.ai
      name: Imogen Labs
    - icon: fontawesome/solid/user
      link: https://mjashley.com
      name: Developer

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

# Page tree
nav:
  - Home: index.md
  - Getting Started:
      - Quick Start: guides/quick-start.md
      - Web Dashboard: guides/web-dashboard.md
      - Mobile App: guides/mobile-app.md
      - Configuration: guides/configuration.md
  - Guides:
      - Traefik & Domain Setup: guides/traefik-setup.md
      - CLI Installation: guides/cli-installation.md
      - API Reference: guides/api-reference.md
      - Security: guides/security.md
  - Developer:
      - Architecture: guides/architecture.md
      - CLI Bridge: guides/cli-bridge.md
      - Contributing: guides/contributing.md
  - Migration Guide: guides/migration.md
  - Project History: guides/history.md
  - White-Label & Forking: guides/white-label.md
  - FAQ & Troubleshooting: guides/faq.md
  - Changelog: install/changelog.md
